<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Authentication Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 500px;
            width: 90%;
        }
        
        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8em;
            text-align: center;
        }
        
        .subtitle {
            color: #999;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9em;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .warning {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 12px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 0.85em;
            line-height: 1.5;
        }
        
        .demo-creds {
            background: #f5f5f5;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 0.85em;
            color: #666;
        }
        
        .demo-creds p {
            margin: 6px 0;
        }
        
        .demo-creds strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <h1>🔐 Corporate Portal</h1>
            <p class="subtitle">Secure Authentication System</p>
            
            <div id="message" class="message"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="e.g., admin"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter password"
                        required
                    >
                </div>
                <button type="submit">Login</button>
            </form>
            
            <div class="demo-creds">
                <p><strong>Demo Credentials:</strong></p>
                <p>👤 Username: <code>admin</code></p>
                <p>🔑 Password: <code>SecureP@ssw0rd</code></p>
            </div>
            
            <div class="warning">
                ⚠️ <strong>TESTING ENVIRONMENT:</strong> This application is intentionally vulnerable for authorized cybersecurity testing only. Do not use with real credentials or in production.
            </div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('login-form');
        const messageDiv = document.getElementById('message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);
                
                const response = await fetch('/login', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = `✓ Welcome ${data.user.username}! Authentication successful.`;
                    form.reset();
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = `✗ ${data.message || 'Authentication failed'}`;
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = `✗ Error: ${error.message}`;
            }
        });
    </script>
</body>
</html>
