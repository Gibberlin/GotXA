<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEM Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #ff6b6b;
        }
        
        h1 {
            font-size: 2.5em;
            color: #ff6b6b;
            margin-bottom: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #2d2d44 0%, #3a3a54 100%);
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(255, 107, 107, 0.3);
        }
        
        .stat-card h3 {
            color: #ff6b6b;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        
        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #4ecdc4;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: linear-gradient(135deg, #2d2d44 0%, #3a3a54 100%);
            border: 1px solid #4ecdc4;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .chart-card h3 {
            color: #4ecdc4;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .chart-bar {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }
        
        .chart-bar .label {
            min-width: 100px;
            text-align: right;
            font-size: 0.9em;
            color: #b0b0b0;
        }
        
        .chart-bar .bar {
            flex: 1;
            height: 24px;
            background: linear-gradient(90deg, #4ecdc4 0%, #44b8a8 100%);
            border-radius: 4px;
            position: relative;
            min-width: 20px;
        }
        
        .chart-bar .bar.high {
            background: linear-gradient(90deg, #ff6b6b 0%, #ff5252 100%);
        }
        
        .chart-bar .bar.medium {
            background: linear-gradient(90deg, #ffa500 0%, #ff8c00 100%);
        }
        
        .chart-bar .value {
            color: #e0e0e0;
            font-size: 0.85em;
            font-weight: bold;
            margin-left: 8px;
            min-width: 40px;
        }
        
        .logs-alerts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        
        @media (max-width: 1000px) {
            .logs-alerts-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .table-card {
            background: linear-gradient(135deg, #2d2d44 0%, #3a3a54 100%);
            border: 1px solid #4ecdc4;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            max-height: 600px;
            overflow-y: auto;
        }
        
        .table-card h3 {
            color: #4ecdc4;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .log-entry, .alert-entry {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #4ecdc4;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 0.9em;
            transition: background 0.2s;
        }
        
        .log-entry:hover, .alert-entry:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .alert-entry {
            border-left-color: #ff6b6b;
        }
        
        .log-entry .timestamp, .alert-entry .timestamp {
            color: #4ecdc4;
            font-size: 0.85em;
            margin-bottom: 4px;
        }
        
        .log-entry .level {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.8em;
            font-weight: bold;
            margin-right: 8px;
            margin-bottom: 6px;
        }
        
        .log-entry .level.ERROR {
            background: #ff6b6b;
            color: white;
        }
        
        .log-entry .level.WARN {
            background: #ffa500;
            color: white;
        }
        
        .log-entry .level.INFO {
            background: #4ecdc4;
            color: white;
        }
        
        .log-entry .level.DEBUG {
            background: #b0b0b0;
            color: white;
        }
        
        .alert-entry .severity {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.8em;
            font-weight: bold;
            margin-right: 8px;
            margin-bottom: 6px;
        }
        
        .alert-entry .severity.HIGH {
            background: #ff6b6b;
            color: white;
        }
        
        .alert-entry .severity.MEDIUM {
            background: #ffa500;
            color: white;
        }
        
        .log-entry .message, .alert-entry .message {
            color: #d0d0d0;
            word-break: break-word;
        }
        
        .log-entry .host, .alert-entry .host {
            color: #b0b0b0;
            font-size: 0.85em;
            margin-top: 6px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1em;
            color: #4ecdc4;
        }
        
        .error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .updating {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔒 SIEM Dashboard</h1>
            <p>Real-time Security Information and Event Management</p>
        </header>
        
        <div id="error-message"></div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Logs</h3>
                <div class="value" id="total-logs">-</div>
            </div>
            <div class="stat-card">
                <h3>Total Alerts</h3>
                <div class="value" id="total-alerts">-</div>
            </div>
            <div class="stat-card">
                <h3>High Severity</h3>
                <div class="value" id="high-alerts" style="color: #ff6b6b;">-</div>
            </div>
            <div class="stat-card">
                <h3>Medium Severity</h3>
                <div class="value" id="medium-alerts" style="color: #ffa500;">-</div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-card">
                <h3>📊 Logs by Level</h3>
                <div id="logs-by-level"></div>
            </div>
            <div class="chart-card">
                <h3>⚠️ Alerts by Severity</h3>
                <div id="alerts-by-severity"></div>
            </div>
            <div class="chart-card">
                <h3>🏢 Logs by Host</h3>
                <div id="logs-by-host"></div>
            </div>
        </div>
        
        <div class="logs-alerts-grid">
            <div class="table-card">
                <h3>📝 Recent Logs</h3>
                <div id="recent-logs"></div>
            </div>
            <div class="table-card">
                <h3>🚨 Recent Alerts</h3>
                <div id="recent-alerts"></div>
            </div>
        </div>
    </div>
    
    <script>
        const updateInterval = 5000; // Update every 5 seconds
        
        function formatTimestamp(ts) {
            const date = new Date(ts);
            return date.toLocaleString();
        }
        
        function getMaxValue(obj) {
            return Math.max(...Object.values(obj).map(v => typeof v === 'number' ? v : 0), 1);
        }
        
        async function loadDashboard() {
            try {
                const response = await fetch('/api/dashboard-data');
                const data = await response.json();
                
                if (!response.ok) {
                    showError(`Error: ${data.error}`);
                    return;
                }
                
                // Update stat cards
                document.getElementById('total-logs').textContent = data.total_logs || 0;
                document.getElementById('total-alerts').textContent = data.total_alerts || 0;
                document.getElementById('high-alerts').textContent = data.alerts_by_severity?.HIGH || 0;
                document.getElementById('medium-alerts').textContent = data.alerts_by_severity?.MEDIUM || 0;
                
                // Update logs by level chart
                const logsByLevelDiv = document.getElementById('logs-by-level');
                logsByLevelDiv.innerHTML = '';
                if (data.logs_by_level && Object.keys(data.logs_by_level).length > 0) {
                    const maxLogLevel = getMaxValue(data.logs_by_level);
                    Object.entries(data.logs_by_level).forEach(([level, count]) => {
                        const percentage = (count / maxLogLevel) * 100;
                        logsByLevelDiv.innerHTML += `
                            <div class="chart-bar">
                                <div class="label">${level}</div>
                                <div class="bar" style="width: ${percentage}%;"></div>
                                <div class="value">${count}</div>
                            </div>
                        `;
                    });
                } else {
                    logsByLevelDiv.innerHTML = '<p style="color: #b0b0b0;">No data</p>';
                }
                
                // Update alerts by severity chart
                const alertsBySeverityDiv = document.getElementById('alerts-by-severity');
                alertsBySeverityDiv.innerHTML = '';
                if (data.alerts_by_severity && Object.keys(data.alerts_by_severity).length > 0) {
                    const maxSeverity = getMaxValue(data.alerts_by_severity);
                    Object.entries(data.alerts_by_severity).forEach(([severity, count]) => {
                        const percentage = (count / maxSeverity) * 100;
                        const barClass = severity === 'HIGH' ? 'high' : severity === 'MEDIUM' ? 'medium' : '';
                        alertsBySeverityDiv.innerHTML += `
                            <div class="chart-bar">
                                <div class="label">${severity}</div>
                                <div class="bar ${barClass}" style="width: ${percentage}%;"></div>
                                <div class="value">${count}</div>
                            </div>
                        `;
                    });
                } else {
                    alertsBySeverityDiv.innerHTML = '<p style="color: #b0b0b0;">No data</p>';
                }
                
                // Update logs by host chart
                const logsByHostDiv = document.getElementById('logs-by-host');
                logsByHostDiv.innerHTML = '';
                if (data.logs_by_host && Object.keys(data.logs_by_host).length > 0) {
                    const maxHost = getMaxValue(data.logs_by_host);
                    Object.entries(data.logs_by_host).forEach(([host, count]) => {
                        const percentage = (count / maxHost) * 100;
                        const shortHost = host.length > 15 ? host.substring(0, 12) + '...' : host;
                        logsByHostDiv.innerHTML += `
                            <div class="chart-bar" title="${host}">
                                <div class="label">${shortHost}</div>
                                <div class="bar" style="width: ${percentage}%;"></div>
                                <div class="value">${count}</div>
                            </div>
                        `;
                    });
                } else {
                    logsByHostDiv.innerHTML = '<p style="color: #b0b0b0;">No data</p>';
                }
                
                // Update recent logs
                const recentLogsDiv = document.getElementById('recent-logs');
                recentLogsDiv.innerHTML = '';
                if (data.recent_logs && data.recent_logs.length > 0) {
                    data.recent_logs.forEach(log => {
                        recentLogsDiv.innerHTML += `
                            <div class="log-entry">
                                <div class="timestamp">${formatTimestamp(log.timestamp)}</div>
                                <div>
                                    <span class="level ${log.level}">${log.level}</span>
                                    <span style="color: #b0b0b0;">${log.host}</span>
                                </div>
                                <div class="message">${log.message}</div>
                            </div>
                        `;
                    });
                } else {
                    recentLogsDiv.innerHTML = '<p style="color: #b0b0b0;">No logs</p>';
                }
                
                // Update recent alerts
                const recentAlertsDiv = document.getElementById('recent-alerts');
                recentAlertsDiv.innerHTML = '';
                if (data.recent_alerts && data.recent_alerts.length > 0) {
                    data.recent_alerts.forEach(alert => {
                        recentAlertsDiv.innerHTML += `
                            <div class="alert-entry">
                                <div class="timestamp">${formatTimestamp(alert.timestamp)}</div>
                                <div>
                                    <span class="severity ${alert.severity}">${alert.severity}</span>
                                    <span style="color: #b0b0b0;">${alert.host}</span>
                                </div>
                                <div style="color: #b0b0b0; font-size: 0.85em; margin-bottom: 6px;">${alert.rule}</div>
                                <div class="message">${alert.log_message}</div>
                            </div>
                        `;
                    });
                } else {
                    recentAlertsDiv.innerHTML = '<p style="color: #b0b0b0;">No alerts</p>';
                }
                
                clearError();
            } catch (error) {
                showError(`Failed to load dashboard: ${error.message}`);
            }
        }
        
        function showError(message) {
            document.getElementById('error-message').innerHTML = `<div class="error">${message}</div>`;
        }
        
        function clearError() {
            document.getElementById('error-message').innerHTML = '';
        }
        
        // Initial load
        loadDashboard();
        
        // Auto-update
        setInterval(loadDashboard, updateInterval);
    </script>
</body>
</html>
