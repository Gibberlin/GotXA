input {
  tcp {
    port => 5000
    codec => plain
    host => "0.0.0.0"
  }
}

filter {
  # Parse syslog-like format from log_generator.sh output
  if [message] =~ /^\[/ {
    grok {
      match => { "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] %{LOGLEVEL:level} - %{GREEDYDATA:message_content}" }
      remove_field => [ "message" ]
    }
  }
  
  mutate {
    add_field => {
      "host" => "%{host}"
      "@siem_ingested_at" => "%{@timestamp}"
    }
  }
}

output {
  http {
    url => "http://siem-server:5000/logs/ingest"
    http_method => "post"
    format => "json"
    codec => "json"
  }
  
  stdout {
    codec => rubydebug
  }
}
