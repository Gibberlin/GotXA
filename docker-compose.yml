version: '3.9'

services:
  # =========================================================================
  # SECURITY LAYER (172.23.0.0/16)
  # Central SIEM, database, and log collection
  # =========================================================================
  
  siem-postgres:
    image: postgres:15-alpine
    container_name: siem-postgres
    environment:
      POSTGRES_DB: siem_db
      POSTGRES_USER: siem_user
      POSTGRES_PASSWORD: siem_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - security-control
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siem_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  siem-soar-server:
    build:
      context: .
      dockerfile: Dockerfile.siem
    container_name: siem-soar-server
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://siem_user:siem_password@siem-postgres:5432/siem_db
    networks:
      - security-control
      - corporate-net
      - operational-net
    depends_on:
      siem-postgres:
        condition: service_healthy
    restart: unless-stopped

  log-collector-dedicated:
    build:
      context: .
      dockerfile: Dockerfile.collector
    container_name: log-collector-dedicated
    ports:
      - "5005:5001"
    volumes:
      - logs_shared:/logs
    networks:
      - security-control
      - corporate-net
      - operational-net
    depends_on:
      - siem-soar-server
    restart: unless-stopped

  # =========================================================================
  # CORPORATE NETWORK (172.24.0.0/16)
  # Vulnerable app for testing + passive infrastructure
  # =========================================================================
  
  corp-portal-agent:
    build:
      context: .
      dockerfile: Dockerfile.vulnerable
    container_name: corp-portal-agent
    ports:
      - "5001:5001"
    volumes:
      - logs_shared:/logs
    networks:
      - corporate-net
    restart: unless-stopped

  corp-database-agent:
    image: postgres:15-alpine
    container_name: corp-database-agent
    environment:
      POSTGRES_DB: corp_db
      POSTGRES_USER: corp_user
      POSTGRES_PASSWORD: corp_password
    networks:
      - corporate-net
    restart: unless-stopped

  # =========================================================================
  # OT/SCADA NETWORK (172.25.0.0/16)
  # Simulated operational technology agents
  # =========================================================================
  
  ot-scada-gateway:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: ot-scada-gateway
    ports:
      - "5002:5002"
    environment:
      AGENT_NAME: ot-scada-gateway
    volumes:
      - logs_shared:/logs
    networks:
      - operational-net
    restart: unless-stopped

  ot-plc-refinery-1:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: ot-plc-refinery-1
    ports:
      - "5003:5003"
    environment:
      AGENT_NAME: ot-plc-refinery-1
    volumes:
      - logs_shared:/logs
    networks:
      - operational-net
    restart: unless-stopped

  ot-plc-refinery-2:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: ot-plc-refinery-2
    ports:
      - "5004:5004"
    environment:
      AGENT_NAME: ot-plc-refinery-2
    volumes:
      - logs_shared:/logs
    networks:
      - operational-net
    restart: unless-stopped

# ============================================================================
# NETWORKS (3 Isolated Networks)
# ============================================================================
networks:
  security-control:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/16

  corporate-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.24.0.0/16

  operational-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data:
    driver: local
  logs_shared:
    driver: local
